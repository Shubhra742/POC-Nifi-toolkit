name: Deploy NiFi Flow to Production

on:
  push:
    branches: [main]
    paths:
      - 'default/*.json'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Get new commit SHA
        id: version
        run: |
          VERSION=$(git rev-parse HEAD)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Change version on existing PROD flow
        run: |
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-change-version \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid 952fc8b2-019d-1000-db88-83e8b605f342 \
            -fv ${{ steps.version.outputs.VERSION }}
          echo "✅ PROD updated to: ${{ steps.version.outputs.VERSION }}"

      - name: Verify
        run: |
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-get-version \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid 952fc8b2-019d-1000-db88-83e8b605f342

  rollback:
    runs-on: self-hosted
    needs: deploy
    if: failure()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Rollback to previous version
        run: |
          PREV=$(git rev-parse HEAD~1)
          echo "Rolling back to: $PREV"
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-change-version \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid 952fc8b2-019d-1000-db88-83e8b605f342 \
            -fv $PREV
          echo "⚠️ Rolled back to: $PREV"
