name: Deploy NiFi Flow to Production

on:
  push:
    branches: [main]
    paths:
      - 'default/Loadbalance.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download NiFi Toolkit 2.8.0
        run: |
          wget -q https://archive.apache.org/dist/nifi/2.8.0/nifi-toolkit-2.8.0-bin.zip
          unzip -q nifi-toolkit-2.8.0-bin.zip
          chmod +x nifi-toolkit-2.8.0/bin/cli.sh

      - name: Restore keystore and truststore
        run: |
          echo "${{ secrets.NIFI_KEYSTORE_B64 }}" | base64 -d > /tmp/keystore.jks
          echo "${{ secrets.NIFI_TRUSTSTORE_B64 }}" | base64 -d > /tmp/truststore.jks

      - name: Create NiFi props file
        run: |
          cat > /tmp/nifi-prod.props << PROPS
          baseUrl=${{ secrets.NIFI_PROD_URL }}
          keystore=/tmp/keystore.jks
          keystoreType=JKS
          keystorePasswd=${{ secrets.NIFI_KEYSTORE_PASS }}
          keyPasswd=${{ secrets.NIFI_KEYSTORE_PASS }}
          truststore=/tmp/truststore.jks
          truststoreType=JKS
          truststorePasswd=${{ secrets.NIFI_TRUSTSTORE_PASS }}
          PROPS

      - name: Get new flow version from GitHub
        id: get_version
        run: |
          VERSION=$(curl -s \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/Shubhra742/POC-Nifi-toolkit/commits/main" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Stop PROD flow
        run: |
          ./nifi-toolkit-2.8.0/bin/cli.sh nifi pg-stop \
            -p /tmp/nifi-prod.props \
            -pgid ${{ secrets.NIFI_PROD_PG_ID }}
          echo "PROD flow stopped"

      - name: Deploy new version to PROD
        run: |
          ./nifi-toolkit-2.8.0/bin/cli.sh nifi pg-change-version \
            -p /tmp/nifi-prod.props \
            -pgid ${{ secrets.NIFI_PROD_PG_ID }} \
            -fv ${{ steps.get_version.outputs.VERSION }}
          echo "Deployed version: ${{ steps.get_version.outputs.VERSION }}"

      - name: Start PROD flow
        run: |
          ./nifi-toolkit-2.8.0/bin/cli.sh nifi pg-start \
            -p /tmp/nifi-prod.props \
            -pgid ${{ secrets.NIFI_PROD_PG_ID }}
          echo "PROD flow started"

      - name: Verify deployment
        run: |
          ./nifi-toolkit-2.8.0/bin/cli.sh nifi pg-get-version \
            -p /tmp/nifi-prod.props \
            -pgid ${{ secrets.NIFI_PROD_PG_ID }}

      - name: Notify success
        run: |
          echo "✅ Successfully deployed to PROD!"
          echo "Version: ${{ steps.get_version.outputs.VERSION }}"
          echo "Process Group: ${{ secrets.NIFI_PROD_PG_ID }}"

  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    
    steps:
      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download NiFi Toolkit
        run: |
          wget -q https://archive.apache.org/dist/nifi/2.8.0/nifi-toolkit-2.8.0-bin.zip
          unzip -q nifi-toolkit-2.8.0-bin.zip
          chmod +x nifi-toolkit-2.8.0/bin/cli.sh

      - name: Restore keystore and truststore
        run: |
          echo "${{ secrets.NIFI_KEYSTORE_B64 }}" | base64 -d > /tmp/keystore.jks
          echo "${{ secrets.NIFI_TRUSTSTORE_B64 }}" | base64 -d > /tmp/truststore.jks

      - name: Create NiFi props file
        run: |
          cat > /tmp/nifi-prod.props << PROPS
          baseUrl=${{ secrets.NIFI_PROD_URL }}
          keystore=/tmp/keystore.jks
          keystoreType=JKS
          keystorePasswd=${{ secrets.NIFI_KEYSTORE_PASS }}
          keyPasswd=${{ secrets.NIFI_KEYSTORE_PASS }}
          truststore=/tmp/truststore.jks
          truststoreType=JKS
          truststorePasswd=${{ secrets.NIFI_TRUSTSTORE_PASS }}
          PROPS

      - name: Auto Rollback to previous version
        run: |
          PREV_VERSION=$(curl -s \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/Shubhra742/POC-Nifi-toolkit/commits/main?per_page=2" \
            | python3 -c "import sys,json; commits=json.load(sys.stdin); print(commits[1]['sha'])")
          
          echo "Rolling back to: $PREV_VERSION"
          
          ./nifi-toolkit-2.8.0/bin/cli.sh nifi pg-change-version \
            -p /tmp/nifi-prod.props \
            -pgid ${{ secrets.NIFI_PROD_PG_ID }} \
            -fv $PREV_VERSION
          
          echo "⚠️ Rolled back to previous version: $PREV_VERSION"
