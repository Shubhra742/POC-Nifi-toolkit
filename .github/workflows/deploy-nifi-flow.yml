name: Deploy NiFi Flow to Production

on:
  push:
    branches: [main]
    paths:
      - 'default/*.json'

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Get flow name and commit SHA
        id: info
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep "default/.*\.json" | head -1)
          if [ -z "$CHANGED" ]; then
            echo "No flow JSON changed, skipping."
            exit 1
          fi
          FLOW_NAME=$(basename "$CHANGED" .json)
          COMMIT_SHA=$(git rev-parse HEAD)
          PREV_SHA=$(git rev-parse HEAD~1)
          echo "FLOW_NAME=$FLOW_NAME"   >> $GITHUB_OUTPUT
          echo "COMMIT_SHA=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "PREV_SHA=$PREV_SHA"     >> $GITHUB_OUTPUT
          echo "Flow: $FLOW_NAME"
          echo "Deploying SHA: $COMMIT_SHA"
          echo "Rollback SHA:  $PREV_SHA"

      - name: Find PROD process group ID
        id: pgid
        run: |
          PG_ID=$(python3 find_pg.py \
            "${{ steps.info.outputs.FLOW_NAME }}" \
            /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            52295672-019d-1000-b5ff-9d0bfbe1b89a)
          if [ -z "$PG_ID" ]; then
            echo "ERROR: Process group '${{ steps.info.outputs.FLOW_NAME }}' not found in PROD"
            exit 1
          fi
          echo "PG_ID=$PG_ID" >> $GITHUB_OUTPUT
          echo "Found PG: $PG_ID"

      - name: Stop process group before deploy
        run: |
          echo "Stopping process group ${{ steps.pgid.outputs.PG_ID }}..."
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-stop \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid ${{ steps.pgid.outputs.PG_ID }}
          echo "Waiting for processors to stop..."
          sleep 10

      - name: Deploy to PROD
        run: |
          echo "Deploying commit ${{ steps.info.outputs.COMMIT_SHA }} to PG ${{ steps.pgid.outputs.PG_ID }}..."
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-change-version \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid ${{ steps.pgid.outputs.PG_ID }} \
            -fv ${{ steps.info.outputs.COMMIT_SHA }}
          echo "✅ Deployed: ${{ steps.info.outputs.COMMIT_SHA }}"

      - name: Start process group after deploy
        run: |
          echo "Starting process group ${{ steps.pgid.outputs.PG_ID }}..."
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-start \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid ${{ steps.pgid.outputs.PG_ID }}

      - name: Verify deployment
        run: |
          echo "Verifying deployed version..."
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-get-version \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid ${{ steps.pgid.outputs.PG_ID }}

  rollback:
    runs-on: self-hosted
    needs: deploy
    if: failure()
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Get rollback info
        id: info
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep "default/.*\.json" | head -1)
          if [ -z "$CHANGED" ]; then
            echo "ERROR: Cannot determine which flow to roll back"
            exit 1
          fi
          FLOW_NAME=$(basename "$CHANGED" .json)
          PREV_SHA=$(git rev-parse HEAD~1)
          echo "FLOW_NAME=$FLOW_NAME" >> $GITHUB_OUTPUT
          echo "PREV_SHA=$PREV_SHA"   >> $GITHUB_OUTPUT
          echo "Flow: $FLOW_NAME"
          echo "Rolling back to SHA: $PREV_SHA"

      - name: Find PROD process group ID
        id: pgid
        run: |
          PG_ID=$(python3 find_pg.py \
            "${{ steps.info.outputs.FLOW_NAME }}" \
            /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            52295672-019d-1000-b5ff-9d0bfbe1b89a)
          if [ -z "$PG_ID" ]; then
            echo "ERROR: Process group not found during rollback"
            exit 1
          fi
          echo "PG_ID=$PG_ID" >> $GITHUB_OUTPUT
          echo "Found PG: $PG_ID"

      - name: Stop process group before rollback
        run: |
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-stop \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid ${{ steps.pgid.outputs.PG_ID }}
          sleep 10

      - name: Rollback to previous version
        run: |
          echo "Rolling back PG ${{ steps.pgid.outputs.PG_ID }} to ${{ steps.info.outputs.PREV_SHA }}..."
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-change-version \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid ${{ steps.pgid.outputs.PG_ID }} \
            -fv ${{ steps.info.outputs.PREV_SHA }}
          echo "⚠️ Rolled back to: ${{ steps.info.outputs.PREV_SHA }}"

      - name: Start process group after rollback
        run: |
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-start \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid ${{ steps.pgid.outputs.PG_ID }}

      - name: Verify rollback
        run: |
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-get-version \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid ${{ steps.pgid.outputs.PG_ID }}
