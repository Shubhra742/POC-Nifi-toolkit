name: Deploy NiFi Flow to Production

on:
  push:
    branches: [main]
    paths:
      - 'default/Loadbalance.json'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Import latest flow from GitHub to PROD
        run: |
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-import \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -rcid 8c333ca5-019d-1000-ffff-ffff9dd513db \
            --flowBranch main \
            -b default \
            -f Loadbalance \
            -pgid 52295672-019d-1000-b5ff-9d0bfbe1b89a
          echo "✅ New version deployed to PROD!"

      - name: Verify deployment
        run: |
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-list \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid 52295672-019d-1000-b5ff-9d0bfbe1b89a
