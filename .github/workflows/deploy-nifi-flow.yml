name: Deploy NiFi Flow to Production

on:
  push:
    branches: [main]
    paths:
      - 'default/Loadbalance.json'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Get new version SHA
        id: version
        run: |
          VERSION=$(git rev-parse HEAD)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Stop PROD flow
        run: |
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-stop \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid 9045c02f-019d-1000-8fab-b3062dbc2a0c

      - name: Deploy new version to PROD
        run: |
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-change-version \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid 9045c02f-019d-1000-8fab-b3062dbc2a0c \
            -fv ${{ steps.version.outputs.VERSION }}

      - name: Start PROD flow
        run: |
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-start \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid 9045c02f-019d-1000-8fab-b3062dbc2a0c

      - name: Verify deployment
        run: |
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-get-version \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid 9045c02f-019d-1000-8fab-b3062dbc2a0c

  rollback:
    runs-on: self-hosted
    needs: deploy
    if: failure()

    steps:
      - name: Auto Rollback to previous version
        run: |
          PREV=$(git rev-parse HEAD~1)
          echo "Rolling back to: $PREV"
          /opt/nifi/nifi-toolkit-2.8.0/bin/cli.sh nifi pg-change-version \
            -p /opt/nifi/nifi-toolkit-2.8.0/conf/nifi-prod.props \
            -pgid 9045c02f-019d-1000-8fab-b3062dbc2a0c \
            -fv $PREV
          echo "Rolled back to: $PREV"
